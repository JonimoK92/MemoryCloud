services:
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.frontend
        container_name: memorycloud_frontend
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - "5173:5173"
        networks:
            - app

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile.backend
        container_name: memorycloud_backend
        environment:
            DB_CONNECTION: pgsql
            DB_HOST: db
            DB_PORT: 5432
            DB_DATABASE: laravel
            DB_USERNAME: laravel_user
            DB_PASSWORD: laravel_password
        volumes:
            - ./backend:/var/www/html
        working_dir: /var/www/html
        expose:
            - "9000"
        depends_on:
            - db
        networks:
            - app

    nginx:
        image: nginx:alpine
        container_name: memorycloud_nginx
        ports:
            - "8080:80"
        volumes:
            - ./backend:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - backend
        networks:
            - app

    db:
        image: postgres:16
        container_name: memorycloud_db
        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: laravel_user
            POSTGRES_PASSWORD: laravel_password
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - app

networks:
    app:
        driver: bridge

volumes:
    db_data:
