services:
    backend:
        build:
            context: ./
            dockerfile: Dockerfile.backend
        container_name: app_backend
        environment:
            DB_CONNECTION: pgsql
            DB_HOST: db
            DB_PORT: 5432
            DB_DATABASE: laravel
            DB_USERNAME: laravel_user
            DB_PASSWORD: laravel_password
        expose:
            - "9000"
        volumes:
            - .:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - db
        networks:
            - app

    nginx:
        image: nginx:latest
        container_name: app_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - backend
        networks:
            - app

    db:
        image: postgres:16
        container_name: app_db
        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: laravel_user
            POSTGRES_PASSWORD: laravel_password
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - app

networks:
    app:
        driver: bridge

volumes:
    db_data:
